  #       action: keep
  #       regex: true
  #     # Use custom port from annotation: prometheus.io/port
  #     - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
  #       action: replace
  #       target_label: __address__
  #       regex: (.+)
  #       replacement: "$1"
