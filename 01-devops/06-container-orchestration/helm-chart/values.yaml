# =============================================================================
# Default values for myapp Helm chart
# Override these in values-staging.yaml or values-prod.yaml
# =============================================================================

# --- Application ---
replicaCount: 3

image:
  repository: myorg/myapp
  tag: "1.0.0"           # Always pin a version, never use 'latest'
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# --- Service ---
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# --- Ingress ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myapp-tls
      hosts:
        - api.example.com

# --- Resources ---
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# --- Autoscaling ---
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# --- Health Checks ---
probes:
  readiness:
    path: /health/ready
    port: 3000
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /health/live
    port: 3000
    initialDelaySeconds: 15
    periodSeconds: 20

# --- Security ---
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

# --- Pod Disruption Budget ---
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# --- Environment Variables ---
env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "info"

# --- Secrets (reference external secrets) ---
envFrom: []
  # - secretRef:
  #     name: myapp-secrets

# --- Prometheus Monitoring ---
serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics

# --- Node Affinity ---
nodeSelector: {}
tolerations: []
affinity: {}
