# =============================================================================
# ☸️ Kubernetes Deployment — Production-Ready
# =============================================================================
# Features:
#   - Rolling update strategy with maxUnavailable/maxSurge
#   - Resource requests and limits
#   - Readiness and liveness probes
#   - Security context (non-root, read-only filesystem)
#   - Pod anti-affinity for high availability
#   - Pod disruption budget
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: production
  labels:
    app: myapp
    version: v1
    team: backend
spec:
  replicas: 3
  # Rolling update strategy — zero-downtime deployments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1   # At most 1 pod down during update
      maxSurge: 1          # At most 1 extra pod during update
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
        version: v1
      annotations:
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Don't run as root — security best practice
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # Spread pods across nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - myapp
                topologyKey: kubernetes.io/hostname

      # Graceful shutdown — give app time to drain connections
      terminationGracePeriodSeconds: 30

      containers:
        - name: app
          image: myorg/myapp:1.0.0  # Always pin version, never use :latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP

          # Resource management — ALWAYS set these
          resources:
            requests:
              cpu: "100m"       # 0.1 CPU core guaranteed
              memory: "128Mi"   # 128 MB guaranteed
            limits:
              cpu: "500m"       # Max 0.5 CPU core
              memory: "512Mi"   # Max 512 MB (OOM-killed if exceeded)

          # Environment variables from ConfigMap and Secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: myapp-secrets
                  key: database-url
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: myapp-config
                  key: log-level

          # Readiness probe — is the app ready to receive traffic?
          # Pods not ready are removed from Service endpoints
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # Liveness probe — is the app still alive?
          # Failed liveness = pod gets restarted
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # Startup probe — for slow-starting apps
          startupProbe:
            httpGet:
              path: /health/live
              port: 3000
            failureThreshold: 30
            periodSeconds: 2

          # Security hardening
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Writable directories (since root FS is read-only)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 100Mi

---
# Pod Disruption Budget — prevent all pods from being evicted at once
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: myapp-pdb
  namespace: production
spec:
  minAvailable: 2  # At least 2 pods must always be running
  selector:
    matchLabels:
      app: myapp

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config
  namespace: production
data:
  log-level: "info"
  cache-ttl: "300"
  feature-flags: |
    {
      "new-dashboard": true,
      "beta-api": false
    }
